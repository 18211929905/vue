name: Build And Deploy To COS

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 配置 Node.js 环境（带缓存）
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 3. 安装依赖
        run: npm ci

      - name: 4. 项目构建打包
        run: npm run build

      - name: 5. 检查构建产物
        run: test -f ./dist/index.html

      - name: 6. 同步到腾讯云 COS
        uses: zkqiang/tencent-cos-action@v1
        with:
          secret_id: ${{ secrets.COS_SECRET_ID }}
          secret_key: ${{ secrets.COS_SECRET_KEY }}
          bucket: ${{ secrets.COS_BUCKET_NAME }}
          region: ${{ secrets.COS_BUCKET_REGION }}
          local_path: ./dist
          remote_path: /dist/
          clean: true

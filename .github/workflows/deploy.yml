name: Build And Deploy To COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 配置 Node.js 环境（带缓存）
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 3. 安装依赖
        run: npm ci

      - name: 4. 项目构建打包
        run: npm run build

      - name: 5. 检查构建产物
        run: test -f ./dist/index.html

      - name: 6. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 7. 安装 COS 命令行工具
        run: pip install coscmd

      - name: 8. 检查 Secrets
        run: |
          test -n "${{ secrets.COS_SECRET_ID }}" || (echo "Missing COS_SECRET_ID" && exit 1)
          test -n "${{ secrets.COS_SECRET_KEY }}" || (echo "Missing COS_SECRET_KEY" && exit 1)
          test -n "${{ secrets.COS_BUCKET_NAME }}" || (echo "Missing COS_BUCKET_NAME" && exit 1)
          test -n "${{ secrets.COS_BUCKET_REGION }}" || (echo "Missing COS_BUCKET_REGION" && exit 1)

      - name: 9. 配置 COS
        run: |
          coscmd config -a ${{ secrets.COS_SECRET_ID }} -s ${{ secrets.COS_SECRET_KEY }} -b ${{ secrets.COS_BUCKET_NAME }} -r ${{ secrets.COS_BUCKET_REGION }}

      - name: 10. 上传 dist 到 COS
        run: |
          coscmd upload -r ./dist/ /dist/
